<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-a-Mole</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #6dd5fa 0%, #84d888 55%, #5a9e36 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    user-select: none;
    padding: 20px;
  }
  h1 {
    font-size: 2.4em; font-weight: 900; color: #3a1f00;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.15), 0 0 20px rgba(255,255,255,0.4);
    margin-bottom: 12px; letter-spacing: 1px;
  }
  #hud { display: flex; gap: 12px; margin-bottom: 14px; }
  #hud span {
    background: rgba(255,255,255,0.75); backdrop-filter: blur(8px);
    padding: 9px 22px; border-radius: 14px; border: 2px solid rgba(58,31,0,0.25);
    font-size: 1.15em; font-weight: 800; color: #3a1f00;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  }
  #grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-bottom: 18px; }
  .hole {
    width: 136px; height: 136px;
    background: radial-gradient(ellipse at 50% 85%, #2a1200 0%, #5a2e12 45%, #8b5c30 100%);
    border-radius: 50%; position: relative; cursor: pointer; overflow: hidden;
    border: 5px solid rgba(42,18,0,0.7);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 -8px 20px rgba(0,0,0,0.5), 0 2px 0 rgba(255,255,255,0.2);
    transition: transform 0.1s;
  }
  .hole:hover { transform: scale(1.03); }
  .mole {
    position: absolute; bottom: -110%; left: 50%; transform: translateX(-50%);
    font-size: 78px; transition: bottom 0.12s cubic-bezier(0.2,1.4,0.6,1);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); pointer-events: none; line-height: 1;
  }
  .hole.active .mole { bottom: -4%; }
  .hole.hit .mole { filter: brightness(0.3) saturate(0) drop-shadow(0 0 12px #ffd700); }
  .hit-effect {
    position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
    font-size: 26px; font-weight: 900; color: #ffd700;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5), 0 0 12px rgba(255,215,0,0.6);
    animation: floatUp 0.75s ease-out forwards; pointer-events: none; z-index: 10;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-70px) scale(1.2); }
  }
  button {
    padding: 13px 38px; font-size: 1.15em; font-weight: 900; font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #ff7043, #f44336); border: none;
    color: white; border-radius: 14px; cursor: pointer;
    box-shadow: 0 5px 15px rgba(244,67,54,0.4); transition: all 0.2s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(244,67,54,0.5); }
  #difficulty { margin-bottom: 14px; display: flex; gap: 10px; }
  .diff-btn {
    padding: 9px 22px; font-size: 0.95em; font-family: 'Nunito', sans-serif;
    background: rgba(255,255,255,0.55); border: 2px solid rgba(58,31,0,0.3);
    color: #3a1f00; border-radius: 12px; cursor: pointer; font-weight: 800; transition: all 0.2s;
  }
  .diff-btn.active { background: linear-gradient(135deg,#ff7043,#f44336); color: white; border-color: transparent; box-shadow: 0 3px 10px rgba(244,67,54,0.3); }
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(6px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; color: white;
  }
  #overlay h2 { font-size: 3em; font-weight: 900; text-shadow: 0 2px 20px rgba(0,0,0,0.5); }
  #overlay p { font-size: 1.4em; font-weight: 700; color: rgba(255,255,255,0.85); }
  #combo {
    font-size: 1.1em; color: #3a1f00; font-weight: 900; min-height: 30px; margin-bottom: 5px;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<h1>🔨 モグラたたき</h1>
<div id="hud">
  <span>スコア: <span id="score">0</span></span>
  <span>残り: <span id="timer">30</span>s</span>
  <span>ミス: <span id="miss">0</span></span>
</div>
<div id="combo"></div>
<div id="difficulty">
  <button class="diff-btn active" onclick="setDiff('easy')">かんたん</button>
  <button class="diff-btn" onclick="setDiff('normal')">ふつう</button>
  <button class="diff-btn" onclick="setDiff('hard')">むずかしい</button>
</div>
<div id="grid"></div>
<button id="startBtn" onclick="startGame()">スタート</button>

<div id="overlay">
  <h2>🔨 モグラたたき</h2>
  <p>モグラが出てきたらすばやくたたこう！</p>
  <button onclick="startGame()" style="font-size:1.2em">スタート</button>
</div>

<script>
const HOLES = 9;
const MOLE_TYPES = [
  { emoji: '🐭', points: 10, speed: 1.0 },
  { emoji: '🐹', points: 20, speed: 0.7 },
  { emoji: '💎', points: 50, speed: 0.5 },
  { emoji: '💣', points: -30, speed: 0.8 }
];

let holes = [], score = 0, miss = 0, timeLeft = 30, gameTimer, moleTimers = [];
let combo = 0, comboTimer;
let difficulty = 'normal';
let running = false;

const DIFF_SETTINGS = {
  easy: { moleTime: 1800, spawnRate: 2000, bombChance: 0 },
  normal: { moleTime: 1200, spawnRate: 1400, bombChance: 0.1 },
  hard: { moleTime: 800, spawnRate: 1000, bombChance: 0.2 }
};

function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function createGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  holes = [];
  for (let i = 0; i < HOLES; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    const moleType = MOLE_TYPES[0];
    hole.innerHTML = `<div class="mole">${moleType.emoji}</div>`;
    hole.addEventListener('click', () => whack(i));
    grid.appendChild(hole);
    holes.push({ el: hole, active: false, type: null });
  }
}

function showMole(i) {
  if (!running || holes[i].active) return;
  const settings = DIFF_SETTINGS[difficulty];
  const usesBomb = Math.random() < settings.bombChance;
  const typeIndex = usesBomb ? 3 :
    Math.random() < 0.6 ? 0 :
    Math.random() < 0.7 ? 1 : 2;
  const type = MOLE_TYPES[typeIndex];
  holes[i].active = true;
  holes[i].type = type;
  holes[i].el.querySelector('.mole').textContent = type.emoji;
  holes[i].el.classList.add('active');

  moleTimers[i] = setTimeout(() => {
    if (holes[i].active && running) {
      hideMole(i, true);
    }
  }, settings.moleTime);
}

function hideMole(i, missed = false) {
  clearTimeout(moleTimers[i]);
  if (missed && holes[i].type && holes[i].type !== MOLE_TYPES[3]) {
    miss++;
    combo = 0;
    document.getElementById('miss').textContent = miss;
    updateComboDisplay();
  }
  holes[i].active = false;
  holes[i].type = null;
  holes[i].el.classList.remove('active', 'hit');
}

function whack(i) {
  if (!running || !holes[i].active) return;
  const type = holes[i].type;
  const pts = type.points;

  if (type === MOLE_TYPES[3]) {
    // Bomb!
    score = Math.max(0, score + pts);
    combo = 0;
    showHitEffect(holes[i].el, pts);
  } else {
    combo++;
    clearTimeout(comboTimer);
    const multiplier = Math.min(combo, 5);
    const earned = pts * multiplier;
    score += earned;
    showHitEffect(holes[i].el, '+' + earned + (multiplier > 1 ? ` x${multiplier}!` : ''));
    comboTimer = setTimeout(() => { combo = 0; updateComboDisplay(); }, 2000);
  }

  updateComboDisplay();
  document.getElementById('score').textContent = score;
  holes[i].el.classList.add('hit');
  setTimeout(() => hideMole(i), 150);
}

function showHitEffect(el, text) {
  const effect = document.createElement('div');
  effect.className = 'hit-effect';
  effect.textContent = text;
  el.appendChild(effect);
  setTimeout(() => effect.remove(), 700);
}

function updateComboDisplay() {
  const el = document.getElementById('combo');
  if (combo >= 2) {
    el.textContent = `🔥 ${combo} コンボ！`;
    el.style.color = combo >= 4 ? '#ff4444' : '#ff8800';
  } else {
    el.textContent = '';
  }
}

function spawnMoles() {
  if (!running) return;
  const settings = DIFF_SETTINGS[difficulty];
  const emptyHoles = holes.map((h, i) => !h.active ? i : -1).filter(i => i >= 0);
  if (emptyHoles.length > 0) {
    const idx = emptyHoles[Math.floor(Math.random() * emptyHoles.length)];
    showMole(idx);
  }
  setTimeout(spawnMoles, settings.spawnRate * (0.8 + Math.random() * 0.4));
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  createGrid();
  score = 0; miss = 0; timeLeft = 30; combo = 0; running = true;
  document.getElementById('score').textContent = 0;
  document.getElementById('miss').textContent = 0;
  document.getElementById('timer').textContent = 30;
  document.getElementById('combo').textContent = '';

  clearInterval(gameTimer);
  gameTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);

  spawnMoles();
}

function endGame() {
  running = false;
  clearInterval(gameTimer);
  moleTimers.forEach(t => clearTimeout(t));
  holes.forEach((h, i) => hideMole(i));

  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <h2>ゲーム終了！</h2>
    <p>スコア: <strong>${score}</strong></p>
    <p>ミス: ${miss}回 | コンボ最高: ${combo}</p>
    <button onclick="startGame()" style="font-size:1.1em;padding:12px 35px">もう一度</button>
  `;
  overlay.style.display = 'flex';
}

createGrid();
</script>
</body>
</html>
